<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dwengochart renderer — dev sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 13px; color: #aaa; }
    header strong { color: #e94560; }
    #chart { flex: 1; }
    svg { width: 100%; height: 100%; }
    #log { height: 160px; overflow-y: auto; padding: 8px 16px; background: #0d0d1a; border-top: 1px solid #0f3460; font-size: 11px; line-height: 1.8; }
    .log-entry { color: #4ecdc4; }
    .log-entry.error { color: #e94560; }
  </style>
</head>
<body>
  <header>
    <strong>@dwengochart/renderer</strong> &nbsp;·&nbsp; dev sandbox &nbsp;·&nbsp; open DevTools → Elements to inspect SVG
  </header>
  <div id="chart"></div>
  <div id="log"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
